name: Build Windows EXE

# Builds BillCategorizer.exe on every push to main and on every tag like v1.0.0.
# Produces two things:
#   1. A downloadable "BillCategorizer-windows" artifact on every run (retained 30 days).
#   2. A GitHub Release with the packaged ZIP attached when you push a tag (e.g. `git tag v1.0.0 && git push --tags`).

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch: {}  # lets you trigger a build manually from the Actions tab

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Windows executable
        run: |
          pyinstaller `
            --noconfirm `
            --onefile `
            --windowed `
            --name BillCategorizer `
            --add-data "config.json;." `
            --add-data "category_map.json;." `
            --add-data "data;data" `
            --add-data "assets;assets" `
            --hidden-import tkinterdnd2 `
            app.py

      - name: Assemble distribution folder
        shell: pwsh
        run: |
          $out = "BillCategorizer-windows"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          Copy-Item dist\BillCategorizer.exe $out\
          Copy-Item config.json              $out\
          Copy-Item category_map.json        $out\
          Copy-Item README.md                $out\
          Copy-Item -Recurse data            $out\
          Copy-Item -Recurse assets          $out\
          New-Item -ItemType Directory -Force -Path "$out\reports" | Out-Null
          # Brief end-user readme
          @"
          Bill Categorizer — Windows portable app

          1. (First time only) Open config.json in Notepad and paste in your Salesforce
             username, password, and security token. Save.
          2. Double-click BillCategorizer.exe to launch.
          3. Exported reports land in the reports\ folder next to the EXE.

          If Windows shows a blue SmartScreen warning, click More Info then Run Anyway.
          "@ | Out-File -FilePath "$out\HOW-TO-RUN.txt" -Encoding UTF8

      - name: Zip distribution folder
        shell: pwsh
        run: |
          Compress-Archive -Path BillCategorizer-windows\* -DestinationPath BillCategorizer-windows.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: BillCategorizer-windows
          path: BillCategorizer-windows.zip
          retention-days: 30

      - name: Publish GitHub Release (tagged builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: BillCategorizer-windows.zip
          generate_release_notes: true
